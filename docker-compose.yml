version: '3.9'

services:
  api:
    build:
      context: ./backend
    container_name: paliativeksp-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: paliativeksp
      DB_USER: paliative
      DB_PASSWORD: paliative123
      JWT_SECRET: super-secret-key
    volumes:
      - ./backend:/app
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: paliativeksp-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: paliativeksp
      MYSQL_USER: paliative
      MYSQL_PASSWORD: paliative123
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data:
